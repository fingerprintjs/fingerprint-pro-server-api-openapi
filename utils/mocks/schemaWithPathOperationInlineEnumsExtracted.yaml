openapi: 3.1.1
info:
  title: test
  version: '1.0'
paths:
  /v4/events:
    parameters:
      - name: x-region
        in: header
        required: false
        schema:
          type: string
          enum:
            - us
            - eu
    post:
      operationId: createEvent
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: '#/components/schemas/CreateEventStatus'
    get:
      operationId: getEvents
      parameters:
        - name: bot
          in: query
          schema:
            $ref: '#/components/schemas/GetEventsBot'
          description: Bot filter description.
        - name: visitor_id
          in: query
          schema:
            type: string
        - name: device
          in: query
          schema:
            $ref: '#/components/schemas/GetEventsDevice'
        - name: source
          in: query
          required: false
          schema:
            type: array
            maxItems: 1
            items:
              $ref: '#/components/schemas/GetEventsSource'
  /v4/users:
    get:
      operationId: getUsers
      parameters:
        - name: bot
          in: query
          schema:
            $ref: '#/components/schemas/GetUsersBot'
          description: Bot filter description.
  /v4/visits:
    get:
      operationId: getVisits
      parameters:
        - name: bot
          in: query
          schema:
            $ref: '#/components/schemas/GetVisitsBot'
          description: Different description.
components:
  schemas:
    Device:
      type: object
      properties:
        platform:
          type: string
          enum:
            - web
            - mobile
    CreateEventStatus:
      type: string
      enum:
        - created
        - updated
    GetEventsBot:
      type: string
      enum:
        - all
        - good
      description: Bot filter description.
    GetEventsDevice:
      type: string
      enum:
        - desktop
        - mobile
    GetEventsSource:
      type: string
      enum:
        - edge
    GetUsersBot:
      type: string
      enum:
        - all
        - good
      description: Bot filter description.
    GetVisitsBot:
      type: string
      enum:
        - detected
        - not_detected
      description: Different description.
