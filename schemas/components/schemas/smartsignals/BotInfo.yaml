type: object
description: Extended bot information.
additionalProperties: false
required:
  - category
  - provider
  - name
  - identity
  - confidence
properties:
  category:
    $ref: BotInfoCategory.yaml
  provider:
    type: string
    description: The organization or company operating the bot.
    examples:
      - Anthropic
      - Browserbase
      - Google
      - OpenAI
    x-ruleset-metadata:
      label: Bot Provider
      category: bots
  provider_url:
    type: string
    examples:
      - https://chatgpt.com
    description: The URL of the bot provider's website.
  name:
    type: string
    description: The specific name or identifier of the bot.
    examples:
      - ClaudeBot
      - Browserbase Agent
      - Googlebot
      - GPTBot
      - ChatGPT-User
    x-ruleset-metadata:
      label: Bot Name
      category: bots
  identity:
    $ref: BotInfoIdentity.yaml
  confidence:
    $ref: BotInfoConfidence.yaml
