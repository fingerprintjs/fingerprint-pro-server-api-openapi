type: object
description: |
  Is absent if the velocity data could not be generated for the visitor Id.
additionalProperties: false
required:
  - 5_minutes
  - 1_hour
properties:
  5_minutes:
    type: integer
    examples:
      - 1
    description: |
      Count for the last 5 minutes of velocity data, from the time of the event.
    x-ruleset-metadata:
      label: Last 5 minutes
      category: velocity
  1_hour:
    type: integer
    examples:
      - 5
    description: |
      Count for the last 1 hour of velocity data, from the time of the event.
    x-ruleset-metadata:
      label: Last hour
      category: velocity
  24_hours:
    type: integer
    examples:
      - 5
    description: |
      Count for the last 24 hours of velocity data, from the time of the event.
    x-ruleset-metadata:
      label: Last 24 hours
      category: velocity
