type: object
additionalProperties: false
description: Proxy detection details (present if `proxy` is `true`)
required:
  - proxy_type
properties:
  proxy_type:
    type: string
    enum:
      - residential
      - data_center
      - unknown
    description: |
      Proxy type:
       * `residential` - proxies that route through residential and telecom IP addresses to appear as legitimate traffic
       * `data_center` - proxies which route through data centers
       * `unknown` - reported when a proxy is detected solely by the ML model and the IP sources did not determine a specific type
    x-ruleset-metadata:
      label: Proxy type
      category: ip_address
      enum-labels:
        residential: Residential
        data_center: Data center
  last_seen_at:
    type: integer
    format: int64
    description: |
      Unix millisecond timestamp with hourly resolution of when this IP was last seen as a proxy
  provider:
    type: string
    description: |
      String representing the last proxy service provider detected when this
      IP was synced. An IP can be shared by multiple service providers.
    x-ruleset-metadata:
      label: Proxy service provider
      category: ip_address
