type: array
description: The rule(s) associated with triggering the webhook via rule engine.
items:
  type: object
  additionalProperties: false
  required:
    - id
    - name
    - description
  properties:
    id:
      type: string
      examples:
        - r_uE0af8497PFAOD
    name:
      type: string
      examples:
        - Block bots
    description:
      type: string
      examples:
        - Blocks requests detected as bots
